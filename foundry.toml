# Foundry configuration for VFIDE project

[profile.default]
src = 'contracts'
out = 'out'
libs = ["node_modules", "lib"]
test = 'test/foundry'
cache_path = 'cache/foundry'

# Compiler settings
solc = "0.8.30"
evm_version = "cancun"
optimizer = true
optimizer_runs = 1
via_ir = true

# Fuzz testing configuration
fuzz = { runs = 256, max_test_rejects = 65536 }

# Invariant testing configuration  
invariant = { runs = 256, depth = 15, fail_on_revert = true }

# Gas reporting
gas_reports = ["*"]
gas_reports_ignore = []

# RPC endpoints
[rpc_endpoints]
mainnet = "${MAINNET_RPC_URL}"
sepolia = "${SEPOLIA_RPC_URL}"
# zkSync
zksync = "${ZKSYNC_RPC_URL}"
zksync_sepolia = "${ZKSYNC_SEPOLIA_RPC_URL}"
# Base (Coinbase L2)
base = "https://mainnet.base.org"
base_sepolia = "https://sepolia.base.org"
# Polygon
polygon = "https://polygon-rpc.com"
polygon_amoy = "https://rpc-amoy.polygon.technology"

# Etherscan API keys for verification
[etherscan]
base = { key = "${BASESCAN_API_KEY}", url = "https://api.basescan.org/api" }
base_sepolia = { key = "${BASESCAN_API_KEY}", url = "https://api-sepolia.basescan.org/api" }
polygon = { key = "${POLYGONSCAN_API_KEY}", url = "https://api.polygonscan.com/api" }
polygon_amoy = { key = "${POLYGONSCAN_API_KEY}", url = "https://api-amoy.polygonscan.com/api" }

# Formatter
[fmt]
line_length = 100
tab_width = 4
bracket_spacing = true

# Linter configuration - focus on security-relevant issues
[lint]
severity = ["high", "med"]
# Exclude unsafe-typecast - all typecasts have been audited and are safe
exclude_lints = ["unsafe-typecast"]
