version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: vfide-postgres
    environment:
      POSTGRES_DB: vfide_testnet
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ../database/seed-data.sql:/docker-entrypoint-initdb.d/02-seed-data.sql
      - ../database/schema-extensions.sql:/docker-entrypoint-initdb.d/03-schema-extensions.sql
      - ../database/seed-data-extensions.sql:/docker-entrypoint-initdb.d/04-seed-data-extensions.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - vfide-network

  # Redis (Optional - for WebSocket scaling)
  redis:
    image: redis:7-alpine
    container_name: vfide-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - vfide-network

  # WebSocket Server
  websocket:
    build:
      context: ../websocket-server
      dockerfile: Dockerfile
    container_name: vfide-websocket
    ports:
      - "8080:8080"
    environment:
      PORT: 8080
      NODE_ENV: production
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/vfide_testnet
      REDIS_URL: redis://redis:6379
      REDIS_ENABLED: "true"
      JWT_SECRET: vfide-testnet-jwt-secret-change-in-production
      CORS_ORIGINS: http://localhost:3000,http://localhost:3001,https://testnet.vfide.io
      BASE_SEPOLIA_RPC_URL: https://sepolia.base.org
      DAO_ADDRESS: "0xA462F4C2825f48545a9217FD65B7eB621ea8b507"
      TOKEN_ADDRESS: "0xf57992ab9F8887650C2a220A34fe86ebD00c02f5"
      LOG_LEVEL: info
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - vfide-network

  # Frontend (Development)
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_CHAIN_ID: "84532"
        NEXT_PUBLIC_RPC_URL: "https://sepolia.base.org"
    container_name: vfide-frontend
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_WS_URL: http://localhost:8080
      NEXT_PUBLIC_CHAIN_ID: "84532"
      NEXT_PUBLIC_RPC_URL: "https://sepolia.base.org"
    depends_on:
      - websocket
    restart: unless-stopped
    networks:
      - vfide-network

  # pgAdmin (Optional - Database Management UI)
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: vfide-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@vfide.io
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: "False"
    ports:
      - "5050:80"
    depends_on:
      - postgres
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - vfide-network
    profiles:
      - tools

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  pgadmin_data:
    driver: local

networks:
  vfide-network:
    driver: bridge
