version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: vfide-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: vfide_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis (for rate limiting and caching)
  redis:
    image: redis:7-alpine
    container_name: vfide-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # WebSocket Server
  websocket:
    build:
      context: ./websocket-server
      dockerfile: Dockerfile
    container_name: vfide-websocket
    ports:
      - "8080:8080"
    environment:
      - WS_PORT=8080
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/vfide_dev
      - CORS_ORIGIN=http://localhost:3000
      - ALLOW_DEV_AUTH_BYPASS=true
      - NODE_ENV=development
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # Next.js Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    container_name: vfide-app
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/vfide_dev
      - REDIS_URL=redis://redis:6379
      - NEXT_PUBLIC_IS_TESTNET=true
      - NEXT_PUBLIC_DEFAULT_CHAIN=base
      - NEXT_PUBLIC_CHAIN_ID=84532
      - NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID=${NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID}
      - WS_URL=http://localhost:8080
      - NODE_ENV=development
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      websocket:
        condition: service_started
    restart: unless-stopped
    command: npm run dev

volumes:
  postgres_data:
  redis_data:
