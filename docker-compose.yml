services:
  postgres:
    image: postgres:16-alpine
    container_name: vfide-postgres
    restart: unless-stopped
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      POSTGRES_USER: vfide_user
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
      POSTGRES_DB: vfide_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    secrets:
      - postgres_password
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vfide_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  migrator:
    image: node:25-alpine
    container_name: vfide-migrator
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy
    working_dir: /app
    volumes:
      - ./:/app
    secrets:
      - postgres_password
    command: ["sh", "-c", "export DATABASE_URL=postgresql://vfide_user:$(cat /run/secrets/postgres_password)@postgres:5432/vfide_db && npm ci && npm run migrate:up"]

  websocket:
    build:
      context: ./websocket-server
      dockerfile: Dockerfile
    container_name: vfide-websocket
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:8080"
    depends_on:
      migrator:
        condition: service_completed_successfully
    environment:
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:3000}
    secrets:
      - jwt_secret
      - postgres_password
    command: ["sh", "-c", "export JWT_SECRET=$(cat /run/secrets/jwt_secret) && export DATABASE_URL=postgresql://vfide_user:$(cat /run/secrets/postgres_password)@postgres:5432/vfide_db && node dist/index.js"]
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 512M
        reservations:
          cpus: "0.10"
          memory: 128M

volumes:
  postgres_data:
    driver: local

secrets:
  postgres_password:
    file: ./.secrets/postgres_password
  jwt_secret:
    file: ./.secrets/jwt_secret

networks:
  default:
    name: vfide-network
