version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: vfide-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: vfide_user
      # SECURITY: Do NOT use this default password in any non-local environment.
      # Set POSTGRES_PASSWORD via Docker secrets or a secrets manager (e.g. AWS Secrets Manager).
      # Generate a strong password: openssl rand -base64 32
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      POSTGRES_DB: vfide_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vfide_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  # WebSocket server (optional - commented out by default)
  # The Dockerfile now exists at websocket-server/Dockerfile.
  # Before enabling, complete all items in §26 of the audit doc and set the required env vars.
  # See websocket-server/README.md for full configuration instructions.
  # websocket:
  #   build:
  #     context: ./websocket-server
  #     dockerfile: Dockerfile
  #   container_name: vfide-websocket
  #   restart: unless-stopped
  #   ports:
  #     - "8080:8080"
  #   depends_on:
  #     - postgres
  #   environment:
  #     JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set}
  #     ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:3000}
  #     DATABASE_URL: postgresql://vfide_user:${POSTGRES_PASSWORD}@postgres:5432/vfide_db

volumes:
  postgres_data:
    driver: local

networks:
  default:
    name: vfide-network
