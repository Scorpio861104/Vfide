version: '3.8'

services:
  # Frontend - Next.js application
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: vfide-frontend
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_CHAIN_ID=${NEXT_PUBLIC_CHAIN_ID:-84532}
      - NEXT_PUBLIC_CONTRACT_ADDRESS=${NEXT_PUBLIC_CONTRACT_ADDRESS}
      - NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID=${NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID}
      - NEXT_PUBLIC_WEBSOCKET_URL=ws://websocket-server:3001
      - NEXT_PUBLIC_ALCHEMY_KEY=${NEXT_PUBLIC_ALCHEMY_KEY}
    depends_on:
      - websocket-server
    networks:
      - vfide-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # WebSocket Server - Real-time communication
  websocket-server:
    build:
      context: ./websocket-server
      dockerfile: Dockerfile
    container_name: vfide-websocket
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - JWT_SECRET=${JWT_SECRET}
      - ETHEREUM_RPC_URL=${ETHEREUM_RPC_URL}
      - REDIS_URL=redis://redis:6379
      - CORS_ORIGIN=http://frontend:3000
    depends_on:
      - redis
    networks:
      - vfide-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # Redis - WebSocket session management and caching
  redis:
    image: redis:7-alpine
    container_name: vfide-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - vfide-network
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Nginx - Reverse proxy (optional, for production)
  nginx:
    image: nginx:alpine
    container_name: vfide-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - frontend
      - websocket-server
    networks:
      - vfide-network
    restart: unless-stopped
    profiles:
      - production

networks:
  vfide-network:
    driver: bridge

volumes:
  redis-data:
    driver: local
