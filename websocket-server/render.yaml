# Render.com deployment configuration
services:
  - type: web
    name: vfide-websocket
    env: node
    region: oregon
    plan: starter
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 8080
      - key: LOG_LEVEL
        value: info
      - key: CORS_ORIGINS
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: RATE_LIMIT_MAX_CONNECTIONS_PER_IP
        value: 10
      - key: RATE_LIMIT_WINDOW_MS
        value: 60000
      - key: HEARTBEAT_INTERVAL
        value: 30000
      - key: HEARTBEAT_TIMEOUT
        value: 5000
