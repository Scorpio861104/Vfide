<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1200" role="img" aria-labelledby="t d">
  <title id="t">Diversification Master</title>
  <desc id="d">VFIDE badge artwork for Diversification Master</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3d1f10" />
      <stop offset="100%" stop-color="#ba5d1f" />
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="42%" r="52%">
      <stop offset="0%" stop-color="#ffe3d2" stop-opacity="0.45" />
      <stop offset="100%" stop-color="#ffe3d2" stop-opacity="0" />
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="20" stdDeviation="24" flood-color="#000000" flood-opacity="0.4" />
    </filter>
  </defs>

  <rect width="1200" height="1200" fill="url(#bg)" />
  <circle cx="600" cy="500" r="420" fill="url(#glow)" />

  <g filter="url(#shadow)">
    <circle cx="600" cy="520" r="370" fill="#0b1020" fill-opacity="0.36" stroke="#ffbe94" stroke-width="14" />
    <circle cx="600" cy="520" r="332" fill="none" stroke="#38bdf8" stroke-width="18" />
  </g>

  <text x="600" y="550" text-anchor="middle" fill="#ffffff" font-family="'Space Grotesk', 'Segoe UI', sans-serif" font-size="170" font-weight="700" letter-spacing="8">DM</text>

  <rect x="180" y="860" width="840" height="180" rx="24" fill="#040711" fill-opacity="0.55" stroke="#ffffff" stroke-opacity="0.2" />
  <text x="600" y="935" text-anchor="middle" fill="#ffffff" font-family="'Space Grotesk', 'Segoe UI', sans-serif" font-size="58" font-weight="700">Diversification Master</text>
  <text x="600" y="990" text-anchor="middle" fill="#dbeafe" font-family="'Space Grotesk', 'Segoe UI', sans-serif" font-size="30">Achievements &amp; Milestones</text>
</svg>