<svg width="180" height="180" viewBox="0 0 400 440" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="apple-armL" x1="0" y1="0" x2="0.35" y2="1">
      <stop offset="0%" stop-color="#1c3040"/>
      <stop offset="100%" stop-color="#0a1218"/>
    </linearGradient>
    <linearGradient id="apple-armR" x1="1" y1="0" x2="0.65" y2="1">
      <stop offset="0%" stop-color="#243848"/>
      <stop offset="100%" stop-color="#0e1a22"/>
    </linearGradient>
    <linearGradient id="apple-barTop" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00e8f0" stop-opacity="0"/>
      <stop offset="15%" stop-color="#00e8f0" stop-opacity="0.7"/>
      <stop offset="50%" stop-color="#00e8f0"/>
      <stop offset="85%" stop-color="#00e8f0" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#00e8f0" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="apple-barMid" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00e8f0" stop-opacity="0"/>
      <stop offset="20%" stop-color="#00e8f0" stop-opacity="0.35"/>
      <stop offset="50%" stop-color="#00e8f0" stop-opacity="0.5"/>
      <stop offset="80%" stop-color="#00e8f0" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#00e8f0" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="apple-innerL" x1="0.3" y1="0" x2="0.7" y2="1">
      <stop offset="0%" stop-color="#14242e"/>
      <stop offset="100%" stop-color="#0a1418"/>
    </linearGradient>
    <linearGradient id="apple-innerR" x1="0.7" y1="0" x2="0.3" y2="1">
      <stop offset="0%" stop-color="#1a2e38"/>
      <stop offset="100%" stop-color="#0c1820"/>
    </linearGradient>
    <linearGradient id="apple-rise" x1="0.5" y1="1" x2="0.5" y2="0">
      <stop offset="0%" stop-color="#00e8f0"/>
      <stop offset="40%" stop-color="#00c0d0" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#00e8f0" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Left arm -->
  <path d="M52 52 L96 52 L96 68 L82 68 L184 320 L172 320Z" fill="url(#apple-armL)"/>

  <!-- Right arm -->
  <path d="M348 52 L304 52 L304 68 L318 68 L216 320 L228 320Z" fill="url(#apple-armR)"/>

  <!-- Inner depth strokes -->
  <path d="M102 100 L190 312" stroke="url(#apple-innerL)" stroke-width="14" stroke-linecap="butt"/>
  <path d="M298 100 L210 312" stroke="url(#apple-innerR)" stroke-width="14" stroke-linecap="butt"/>

  <!-- Bracket fill patches -->
  <path d="M96 52 L96 68 L82 68 L88 80" fill="url(#apple-innerL)"/>
  <path d="M304 52 L304 68 L318 68 L312 80" fill="url(#apple-innerR)"/>

  <!-- F top bar -->
  <rect x="96" y="52" width="208" height="16" fill="url(#apple-barTop)"/>

  <!-- Bracket shadow blocks -->
  <rect x="96" y="52" width="16" height="16" fill="#0c2030"/>
  <rect x="288" y="52" width="16" height="16" fill="#0e2232"/>

  <!-- F crossbar -->
  <rect x="116" y="130" width="168" height="10" fill="url(#apple-barMid)"/>

  <!-- Vertex chevron + light -->
  <path d="M184 320 L200 360 L216 320" fill="none" stroke="url(#apple-rise)" stroke-width="3" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- Focal point (3 rings) -->
  <circle cx="200" cy="362" r="5.5" fill="#00e8f0"/>
  <circle cx="200" cy="362" r="10" fill="#00e8f0" opacity="0.12"/>
  <circle cx="200" cy="362" r="18" fill="#00e8f0" opacity="0.04"/>
</svg>
