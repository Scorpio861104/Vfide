name: zkSync Toolchain

on:
  push:
    branches: [ main, develop, feature/**, copilot/** ]
  pull_request:
    branches: [ main ]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: zkSync compile (testnet)
        run: npm run compile:zk
      - name: Toolchain verification (EVM + zkSync)
        run: npm run verify:zksync
      - name: Fast tests (archive skipped)
        run: npm test
      - name: Run zkSync-local skipped tests
        run: |
          echo "Skipping actual deploy; network lacks PRIVATE_KEY"
          npx hardhat test --network hardhat --grep 'VFIDEToken zkSync deployment'
      - name: Artifact size report
        run: npx hardhat size-contracts || echo "size-contracts failed"
      - name: Install Foundry
        run: |
          curl -L https://foundry.paradigm.xyz | bash
          source ~/.bashrc
          foundryup
      - name: Foundry fuzz (short run)
        run: |
          FOUNDRY_PROFILE=fuzz forge test --match-contract VFIDETokenFuzz --fuzz-runs 500
      - name: Foundry zkSync build (optional)
        run: |
          FOUNDRY_PROFILE=zksync forge build || echo "zkSync profile build skipped"
      - name: Solidity coverage
        run: |
          npm run coverage || echo "coverage failed"
      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v4
        with:
          name: solidity-coverage
          path: |
            coverage
            coverage.json
          if-no-files-found: ignore
      - name: Coverage threshold check (soft)
        env:
          COVERAGE_MIN_LINES: '70'
          COVERAGE_MIN_BRANCHES: '60'
        run: |
          npm run coverage:check || echo "coverage below threshold"
      - name: Differential capture (EVM)
        run: |
          npm run diff:evm || echo "diff:evm failed"
      - name: Upload diff (EVM)
        uses: actions/upload-artifact@v4
        with:
          name: diff-out-hardhat
          path: diff-out/hardhat.json
          if-no-files-found: ignore
      - name: Differential capture (zkSync) optional
        env:
          PRIVATE_KEY: ${{ secrets.ZKSYNC_PRIVATE_KEY }}
        run: |
          if [ -n "${PRIVATE_KEY:-}" ]; then
            npm run diff:zk || echo "diff:zk failed"
          else
            echo "Skipping diff:zk (no ZKSYNC_PRIVATE_KEY secret)"
          fi
      - name: Differential compare optional
        run: |
          if [ -f diff-out/zkSyncSepoliaTestnet.json ]; then
            npm run diff:compare || echo "diff:compare reported differences"
          else
            echo "Skipping diff:compare (zk capture missing)"
          fi
      - name: Upload diff (zk) optional
        uses: actions/upload-artifact@v4
        with:
          name: diff-out-zk
          path: diff-out/zkSyncSepoliaTestnet.json
          if-no-files-found: ignore
      - name: Foundry coverage (brief)
        run: |
          FOUNDRY_PROFILE=fuzz forge coverage --report lcov --fork-url https://eth-sepolia.g.alchemy.com/v2/demo || echo "coverage skipped"
      - name: Foundry gas snapshot
        run: |
          forge snapshot || echo "snapshot skipped"
