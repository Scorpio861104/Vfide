name: VFIDE Comprehensive Test Suite

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION: "22"

jobs:
  # ───────────────────────────────────────────
  # 1. Smart Contract Tests (Hardhat)
  # ───────────────────────────────────────────
  contract-tests:
    name: "Contracts: Unit + Integration"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
      - run: npm ci
      - run: npx hardhat compile
      # Hardhat 3 dropped the `--parallel` flag from its test task (it was a
      # Hardhat 2 mocha-plugin feature). Tests run sequentially.
      - run: npx hardhat test
        env:
          REPORT_GAS: true
      - name: Upload gas report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: gas-report
          path: gas-report.txt

  # ───────────────────────────────────────────
  # 2. Coverage (must meet thresholds)
  # ───────────────────────────────────────────
  coverage:
    name: "Contracts: Coverage"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
      - run: npm ci
      # Hardhat 3 has built-in coverage via the --coverage flag (no separate plugin needed).
      # The previously-referenced `@nomicfoundation/hardhat-coverage` package does not exist
      # on npm; `solidity-coverage` is for Hardhat 2.x and is incompatible with HH3.
      - run: npx hardhat test --coverage
      - name: Check coverage thresholds
        run: |
          # Verify minimum coverage percentages
          node -e "
          const report = require('./coverage/coverage-summary.json');
          const totals = report.total;
          const MIN = 80;
          const checks = ['statements', 'branches', 'functions', 'lines'];
          let failed = false;
          for (const check of checks) {
            const pct = totals[check].pct;
            if (pct < MIN) {
              console.error('FAIL: ' + check + ' coverage ' + pct + '% < ' + MIN + '%');
              failed = true;
            } else {
              console.log('PASS: ' + check + ' coverage ' + pct + '%');
            }
          }
          if (failed) process.exit(1);
          "
      - name: Upload coverage
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: coverage-report
          path: coverage/

  # ───────────────────────────────────────────
  # 3. Contract Size Check (L-05)
  # ───────────────────────────────────────────
  contract-size:
    name: "Contracts: Size Check (24KB EVM limit)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
      - run: npm ci
      - run: npx hardhat compile
      - name: Check contract sizes
        run: |
          # hardhat-contract-sizer is a Hardhat 2 plugin and is not compatible with
          # Hardhat 3 (HHE1001 on task registration). Use the project's own size
          # verification script which checks both the EIP-170 hard limit and the
          # 24 000-byte buffer policy.
          npm run contract:verify:size-buffer

  # ───────────────────────────────────────────
  # 4. Slither Static Analysis
  # ───────────────────────────────────────────
  slither:
    name: "Security: Slither"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
      - run: npm ci
      # Pre-compile with Hardhat so slither-action can run with ignore-compile:true.
      # This sidesteps two problems:
      #   1. The slither Docker container cannot do `npm ci` (ERESOLVE on
      #      @layerzerolabs peer-deps without --legacy-peer-deps).
      #   2. crytic-compile 0.3.x (bundled with slither 0.11.x) cannot parse
      #      Hardhat 3 build-info (KeyError: 'output'); 0.4.x is required.
      - name: Compile contracts
        run: npx hardhat compile
      - name: Run Slither
        uses: crytic/slither-action@v0.4.2
        id: slither
        with:
          target: 'contracts/'
          # Pin solc to 0.8.30 - matches contracts' `pragma solidity 0.8.30`.
          solc-version: '0.8.30'
          # Do NOT pass --solc-args; with ignore-compile:true slither reads
          # the pre-compiled Hardhat 3 build-info from artifacts/build-info/.
          # --solc-args would switch crytic-compile to the solc platform and
          # invoke system solc 0.8.35, which rejects the 0.8.30 pragma.
          slither-args: '--json slither-output.json'
          fail-on: none
          ignore-compile: true
          # crytic-compile 0.4.1 is required for Hardhat 3 split build-info format.
          slither-plugins: slither-plugins.txt
        continue-on-error: true
      - name: Enforce zero-findings gate
        # Mainnet-readiness contract: post PR #235 the repo runs Slither at 0 findings
        # across every severity tier. Any new finding must be either inline-suppressed
        # with a justification or added to slither.config.json + documented in
        # SLITHER_TRIAGE_RATIONALE.md.
        run: |
          set -euo pipefail
          if [ ! -f slither-output.json ]; then
            echo "::error::slither-output.json not produced — Slither failed to run."
            exit 1
          fi
          COUNT=$(python3 -c "
          import json
          d = json.load(open('slither-output.json'))
          print(len((d.get('results') or {}).get('detectors') or []))
          ")
          echo "Slither finding count: $COUNT"
          if [ "$COUNT" != "0" ]; then
            echo "::error::Slither found $COUNT issue(s). Required: 0. See SLITHER_TRIAGE_RATIONALE.md."
            python3 -c "
          import json
          d = json.load(open('slither-output.json'))
          for r in (d.get('results') or {}).get('detectors') or []:
              line = (r.get('description') or '').splitlines()[0][:160] if r.get('description') else ''
              print(f\"  - [{r.get('impact')}] {r.get('check')} :: {line}\")
          "
            exit 1
          fi
          echo "✅ Slither: 0 findings — gate passes."
      - name: Upload Slither report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: slither-report
          path: slither-output.json

  # ───────────────────────────────────────────
  # 5. Mythril Deep Analysis (scheduled)
  # ───────────────────────────────────────────
  mythril:
    name: "Security: Mythril (critical contracts)"
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
      - run: npm ci
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install mythril
      - run: npx hardhat compile
      - name: Run Mythril on critical contracts
        run: |
          chmod +x scripts/run-mythril.sh
          ./scripts/run-mythril.sh --critical-only
        timeout-minutes: 60
      - name: Upload Mythril reports
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: mythril-reports
          path: reports/mythril/

  # ───────────────────────────────────────────
  # 6. API Tests (Jest)
  # ───────────────────────────────────────────
  api-tests:
    name: "API: Route Tests"
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: vfide_test
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
      - run: npm ci
      - name: Run migrations
        run: npm run migrate:up
        env:
          DATABASE_URL: postgres://test:test@localhost:5432/vfide_test
      - name: Run API tests
        run: npx jest __tests__/api/ --runInBand --forceExit --detectOpenHandles
        env:
          DATABASE_URL: postgres://test:test@localhost:5432/vfide_test
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: test-jwt-secret-for-ci
          NODE_ENV: test
          TEST_API_URL: http://localhost:3000

  # ───────────────────────────────────────────
  # 7. Frontend Tests (Jest + RTL)
  # ───────────────────────────────────────────
  frontend-tests:
    name: "Frontend: Component + Security"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
      - run: npm ci
      - run: npm run test:ci

  # ───────────────────────────────────────────
  # 8. Infrastructure Tests
  # ───────────────────────────────────────────
  infra-tests:
    name: "Infrastructure: Config + Docker + Migrations"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
      - run: npm ci
      - run: npx jest test/infrastructure/

  # ───────────────────────────────────────────
  # 9. Security Regression Suite
  # ───────────────────────────────────────────
  security-regressions:
    name: "Security: Regression Suite (44 findings)"
    runs-on: ubuntu-latest
    needs: [contract-tests]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
      - run: npm ci
      - run: npx hardhat compile
      - run: npx hardhat test test/security/regressions.test.ts

  # ───────────────────────────────────────────
  # 10. E2E Tests (Playwright, on main only)
  # ───────────────────────────────────────────
  e2e-tests:
    name: "E2E: Playwright"
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'
    needs: [api-tests, frontend-tests]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
      - run: npm ci
      - run: npx playwright install --with-deps
      - name: Start app
        run: npm run build && npm start &
        env:
          NODE_ENV: production
      - name: Run E2E
        run: npx playwright test
      - name: Upload E2E results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: playwright-report
          path: playwright-report/

  # ───────────────────────────────────────────
  # 11. Linting
  # ───────────────────────────────────────────
  lint:
    name: "Lint: Solhint + ESLint + Prettier"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
      - run: npm ci
      - run: npx solhint 'contracts/**/*.sol'
      - run: npx eslint . --ext .ts,.tsx --max-warnings 0
      - run: npx prettier --check 'contracts/**/*.sol' 'test/**/*.ts'
