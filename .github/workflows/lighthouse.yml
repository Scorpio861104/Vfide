name: Lighthouse CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      
      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci
      
      - name: Build application
        working-directory: ./frontend
        run: npm run build
        env:
          NEXT_PUBLIC_CHAIN_ID: 31337
          NEXT_PUBLIC_RPC_URL: http://localhost:8545
          NEXT_PUBLIC_WEBSOCKET_URL: http://localhost:3001
          NEXT_PUBLIC_DAO_ADDRESS: "0x0000000000000000000000000000000000000000"
          NEXT_PUBLIC_TOKEN_ADDRESS: "0x0000000000000000000000000000000000000000"
      
      - name: Start application
        working-directory: ./frontend
        run: npm start &
        env:
          PORT: 3000
      
      - name: Wait for server
        run: npx wait-on http://localhost:3000 --timeout 60000
      
      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v11
        with:
          urls: |
            http://localhost:3000
            http://localhost:3000/governance
            http://localhost:3000/council
            http://localhost:3000/chat
          budgetPath: ./frontend/lighthouse-budget.json
          uploadArtifacts: true
          temporaryPublicStorage: true
      
      - name: Format Lighthouse Score
        id: format_lighthouse_score
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');
            const resultsPath = './lhci_reports/manifest.json';
            
            if (fs.existsSync(resultsPath)) {
              const manifest = JSON.parse(fs.readFileSync(resultsPath));
              const results = manifest.map(result => {
                return {
                  url: result.url,
                  performance: Math.round(result.summary.performance * 100),
                  accessibility: Math.round(result.summary.accessibility * 100),
                  bestPractices: Math.round(result.summary['best-practices'] * 100),
                  seo: Math.round(result.summary.seo * 100),
                  pwa: Math.round(result.summary.pwa * 100)
                };
              });
              
              let comment = '## 🔦 Lighthouse CI Results\n\n';
              comment += '| Page | Performance | Accessibility | Best Practices | SEO | PWA |\n';
              comment += '|------|-------------|---------------|----------------|-----|-----|\n';
              
              results.forEach(result => {
                const emoji = (score) => score >= 90 ? '🟢' : score >= 50 ? '🟡' : '🔴';
                comment += `| ${result.url.split('/').pop() || 'Home'} `;
                comment += `| ${emoji(result.performance)} ${result.performance} `;
                comment += `| ${emoji(result.accessibility)} ${result.accessibility} `;
                comment += `| ${emoji(result.bestPractices)} ${result.bestPractices} `;
                comment += `| ${emoji(result.seo)} ${result.seo} `;
                comment += `| ${emoji(result.pwa)} ${result.pwa} |\n`;
              });
              
              core.setOutput('comment', comment);
            }
      
      - name: Comment PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v8
        with:
          script: |
            const comment = `${{ steps.format_lighthouse_score.outputs.comment }}`;
            if (comment) {
              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: comment
              });
            }
