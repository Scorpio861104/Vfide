name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── npm dependency audit ────────────────────────────────────────────────
  npm-audit:
    name: npm audit
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --prefer-offline

      - name: Run npm audit (fail on high/critical)
        run: npm audit --audit-level=high

      - name: Verify supply-chain controls
        run: npm run -s security:supply-chain

  # ── CodeQL SAST (JavaScript / TypeScript) ──────────────────────────────
  codeql:
    name: CodeQL SAST
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read
    strategy:
      fail-fast: false
      matrix:
        language: ['javascript-typescript']
    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          # Use the security-extended query suite for broader coverage
          queries: security-extended

      - name: Auto-build
        uses: github/codeql-action/autobuild@v4

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: '/language:${{ matrix.language }}'

  # ── ESLint security rules ───────────────────────────────────────────────
  eslint-security:
    name: ESLint security rules
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --prefer-offline

      - name: Install eslint-plugin-security
        run: npm install --no-save eslint-plugin-security@^3.0.0 @microsoft/eslint-formatter-sarif@^3.0.0

      - name: Run ESLint with security rules (SARIF output)
        run: |
          npx eslint \
            --plugin security \
            --rule 'security/detect-object-injection: warn' \
            --rule 'security/detect-non-literal-regexp: warn' \
            --rule 'security/detect-non-literal-fs-filename: warn' \
            --rule 'security/detect-eval-with-expression: error' \
            --rule 'security/detect-new-buffer: error' \
            --rule 'security/detect-no-csrf-before-method-override: warn' \
            --rule 'security/detect-possible-timing-attacks: warn' \
            --format @microsoft/eslint-formatter-sarif \
            --output-file eslint-security.sarif \
            'app/**/*.{ts,tsx}' 'lib/**/*.{ts,tsx}' 'pages/**/*.{ts,tsx}' \
          || true

      - name: Upload ESLint SARIF results
        if: always()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: eslint-security.sarif
          category: eslint-security

  # ── Secrets scanning (TruffleHog) ─────────────────────────────────────
  secrets-scan:
    name: TruffleHog secrets scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          # Fetch full history so TruffleHog can scan all commits in the PR
          fetch-depth: 0

      - name: TruffleHog OSS
        uses: trufflesecurity/trufflehog@v3.95.3
        with:
          # Scan only the commits introduced by this push / PR.
          # Use origin/<default_branch> so TruffleHog receives a valid ref.
          base: origin/${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --only-verified

  # ── Slither smart contract static analysis ──────────────────────────────
  slither:
    name: Slither (zero-findings gate)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4

      # Gate policy (post mainnet-readiness PR #235):
      #   The repo currently runs Slither at 0 findings across every severity tier.
      #   This job MUST keep that bar. Any new finding (high/medium/low/info/opt)
      #   fails the PR. To intentionally introduce a finding, you must either:
      #     (a) add an inline `// slither-disable-...` with a justification, or
      #     (b) update slither.config.json `detectors_to_exclude` AND add an entry
      #         to SLITHER_TRIAGE_RATIONALE.md explaining why.
      - name: Run Slither
        uses: crytic/slither-action@v0.4.2
        id: slither
        with:
          target: 'contracts/'
          slither-args: '--json slither-output.json --solc-args "--via-ir --optimize --optimize-runs 0"'
          fail-on: none
        continue-on-error: true

      - name: Enforce zero-findings gate
        run: |
          set -euo pipefail
          if [ ! -f slither-output.json ]; then
            echo "::error::slither-output.json not produced — Slither failed to run."
            exit 1
          fi
          COUNT=$(python3 -c "
          import json
          d = json.load(open('slither-output.json'))
          print(len((d.get('results') or {}).get('detectors') or []))
          ")
          echo "Slither finding count: $COUNT"
          if [ "$COUNT" != "0" ]; then
            echo "::error::Slither found $COUNT issue(s). The mainnet-readiness gate requires 0."
            echo "::error::See SLITHER_TRIAGE_RATIONALE.md for how to address findings."
            python3 -c "
          import json
          d = json.load(open('slither-output.json'))
          for r in (d.get('results') or {}).get('detectors') or []:
              line = (r.get('description') or '').splitlines()[0][:160] if r.get('description') else ''
              print(f\"  - [{r.get('impact')}] {r.get('check')} :: {line}\")
          "
            exit 1
          fi
          echo "✅ Slither: 0 findings — gate passes."

      - name: Upload Slither report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: slither-report
          path: slither-output.json

  # ── Seer watcher verifiers ─────────────────────────────────────────────
  seer-watcher:
    name: Seer watcher verifiers
    uses: ./.github/workflows/seer-watcher.yml

  # ── Container image scanning with Trivy ────────────────────────────────
  trivy:
    name: Trivy container scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image (local, not pushed)
        run: docker build -t vfide:${{ github.sha }} .

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: 'vfide:${{ github.sha }}'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'HIGH,CRITICAL'
          exit-code: '1'
          ignore-unfixed: true

      - name: Upload Trivy scan results to GitHub Security tab
        if: always()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: 'trivy-results.sarif'
