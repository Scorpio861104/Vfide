name: Bug Report
description: Report a bug or issue with VFIDE
title: "[Bug]: "
labels: ["bug", "needs-triage"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill out the information below to help us resolve the issue quickly.

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear and concise description of what the bug is.
      placeholder: When I try to create a proposal, the transaction fails with...
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Step-by-step instructions to reproduce the bug
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. Scroll down to '...'
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen
      placeholder: The proposal should be created successfully
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened
      placeholder: Transaction failed with error "Invalid timestamp"
    validations:
      required: true

  - type: dropdown
    id: component
    attributes:
      label: Component
      description: Which part of VFIDE is affected?
      options:
        - Frontend UI
        - Wallet Connection
        - Smart Contracts
        - Governance
        - Personal Vault
        - Marketplace
        - WebSocket Server
        - Other
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating System
      description: What OS are you using?
      placeholder: "macOS 14.2, Windows 11, Ubuntu 22.04"
    validations:
      required: true

  - type: input
    id: browser
    attributes:
      label: Browser
      description: What browser are you using?
      placeholder: "Chrome 120, Firefox 121, Safari 17"
    validations:
      required: false

  - type: input
    id: wallet
    attributes:
      label: Wallet
      description: What wallet are you using?
      placeholder: "MetaMask 11.8.0, WalletConnect, Coinbase Wallet"
    validations:
      required: false

  - type: input
    id: node-version
    attributes:
      label: Node.js Version (if relevant)
      description: Run `node --version` in terminal
      placeholder: "v18.18.0"
    validations:
      required: false

  - type: input
    id: network
    attributes:
      label: Network
      description: Which blockchain network?
      placeholder: "Base Sepolia, Base Mainnet, Polygon"
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Error Logs
      description: Paste any relevant error messages or console logs
      render: shell
      placeholder: |
        Error: Transaction reverted
        at Contract.call (...)
    validations:
      required: false

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots
      description: If applicable, add screenshots to help explain the problem
      placeholder: Drag and drop images here or paste image URLs
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Add any other context about the problem
      placeholder: This started happening after I updated to version...
    validations:
      required: false

  - type: checkboxes
    id: checklist
    attributes:
      label: Pre-submission Checklist
      description: Please confirm the following
      options:
        - label: I have searched existing issues to ensure this is not a duplicate
          required: true
        - label: I have provided all required information above
          required: true
        - label: I am using the latest version of VFIDE
          required: false
